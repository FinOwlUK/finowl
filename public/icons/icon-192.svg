<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <title>FinOwl App Icon</title>
  <desc>FinOwl - AI Bookkeeper for UK Small Businesses</desc>

  <!-- Outer amber ring / head -->
  <circle cx="96" cy="96" r="96" fill="#d4920b"/>

  <!-- Owl face (darker inner area) -->
  <circle cx="96" cy="100" r="74" fill="#0a0f1a"/>

  <!-- Left eye outer ring -->
  <circle cx="66" cy="88" r="28" fill="#d4920b"/>
  <!-- Left eye pupil -->
  <circle cx="66" cy="88" r="18" fill="#0a0f1a"/>
  <!-- Left eye highlight -->
  <circle cx="58" cy="80" r="5" fill="#ffffff" opacity="0.6"/>

  <!-- Right eye outer ring -->
  <circle cx="126" cy="88" r="28" fill="#d4920b"/>
  <!-- Right eye pupil -->
  <circle cx="126" cy="88" r="18" fill="#0a0f1a"/>
  <!-- Right eye highlight -->
  <circle cx="118" cy="80" r="5" fill="#ffffff" opacity="0.6"/>

  <!-- Beak (triangle pointing down) -->
  <polygon points="96,108 88,122 104,122" fill="#f5dfa3"/>

  <!-- Left ear tuft -->
  <polygon points="50,50 58,72 38,66" fill="#d4920b"/>
  <!-- Right ear tuft -->
  <polygon points="142,50 134,72 154,66" fill="#d4920b"/>

  <!-- Subtle eyebrow ridge for expression -->
  <ellipse cx="96" cy="130" rx="36" ry="8" fill="#1a2035"/>
</svg>