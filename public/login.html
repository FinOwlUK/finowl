<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - FinOwl</title>
    <meta name="theme-color" content="#d4920b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinOwl">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ink: #0a0f1a;
            --paper: #faf9f6;
            --amber: #d4920b;
            --amber-light: #f5dfa3;
            --sage: #2d6a4f;
            --sage-light: #d8f3dc;
            --muted: #6b7280;
            --border: #e5e2db;
            --red: #dc2626;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 3rem;
            text-decoration: none;
            color: var(--ink);
        }
        .logo-owl {
            width: 44px; height: 44px;
            background: var(--amber); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.8rem; }

        .auth-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
        }
        .auth-card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block; font-size: 0.85rem; font-weight: 500;
            margin-bottom: 0.5rem; color: var(--ink);
        }
        .label-row {
            display: flex; justify-content: space-between; align-items: baseline;
        }
        .label-row a {
            font-size: 0.8rem; color: var(--amber); text-decoration: none; font-weight: 500;
        }
        .label-row a:hover { text-decoration: underline; }

        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%; padding: 0.85rem 1rem;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 1rem; font-family: 'DM Sans', sans-serif;
            background: var(--paper); color: var(--ink);
            transition: border-color 0.2s; outline: none;
        }
        .form-group input:focus { border-color: var(--amber); }

        /* Remember Me */
        .remember-row {
            display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;
        }
        .remember-row input[type="checkbox"] {
            width: 18px; height: 18px; border-radius: 4px;
            accent-color: var(--amber); cursor: pointer; flex-shrink: 0;
        }
        .remember-row label {
            font-size: 0.9rem; color: var(--muted); cursor: pointer; user-select: none;
        }

        .btn-primary {
            width: 100%; padding: 0.9rem; background: var(--amber);
            color: #fff; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.88; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .alert {
            border-radius: 10px; padding: 0.85rem 1rem;
            font-size: 0.875rem; margin-bottom: 1.25rem; display: none;
        }
        .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: var(--red); }
        .alert-success { background: var(--sage-light); border: 1px solid #2d6a4f40; color: var(--sage); font-weight: 500; }
        .alert-info {
            background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; font-weight: 500;
        }

        .auth-footer {
            text-align: center; margin-top: 1.5rem; color: var(--muted); font-size: 0.9rem;
        }
        .auth-footer a { color: var(--amber); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }

        .back-link {
            display: block; text-align: center; margin-top: 1.5rem;
            color: var(--muted); font-size: 0.9rem; text-decoration: none;
        }
        .back-link:hover { color: var(--ink); }

        /* Subscription confirmation banner */
        .banner-subscribed {
            background: var(--sage-light); border: 1px solid #2d6a4f40;
            border-radius: 10px; padding: 0.85rem 1rem; margin-bottom: 1.5rem;
            display: flex; align-items: center; gap: 0.6rem;
            font-size: 0.9rem; color: var(--sage); font-weight: 500;
        }
    </style>
    <!-- Sentry client-side error tracking -->
    <script src="/js/error-tracking.js"></script>
</head>
<body>
    <div class="auth-container">
        <a href="/" class="logo">
            <div class="logo-owl">🦉</div>
            <span class="logo-text">FinOwl</span>
        </a>

        <div class="auth-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Log in to your FinOwl account.</p>

            <!-- Dynamic banners (shown by JS based on URL params) -->
            <div id="bannerSubscribed" class="banner-subscribed" style="display:none;">
                <span style="font-size:1.2rem">🎉</span> Subscription confirmed — sign in to get started
            </div>
            <div class="alert alert-success" id="successMsg"></div>
            <div class="alert alert-info" id="infoMsg"></div>
            <div class="alert alert-error" id="errorMsg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@business.co.uk" required autocomplete="email" autofocus>
                </div>
                <div class="form-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="/reset-password">Forgot password?</a>
                    </div>
                    <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
                </div>
                <div class="remember-row">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me for 30 days</label>
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">Log in</button>
            </form>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="/signup">Sign up free</a>
        </div>
        <a href="/" class="back-link">&larr; Back to FinOwl</a>
    </div>

    <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const rememberMeInput = document.getElementById('rememberMe');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const infoMsg = document.getElementById('infoMsg');

    // Build dashboard URL preserving UTM params
    const urlParams = new URLSearchParams(window.location.search);
    const isSubscribed = urlParams.get('subscribed') === 'true';
    const isVerified = urlParams.get('verified') === 'true';
    const autoLoginToken = urlParams.get('token'); // from email verification redirect
    const errorParam = urlParams.get('error');

    let dashboardDest = '/dashboard';
    if (isSubscribed) dashboardDest += '?subscribed=true';
    try {
        var storedUtm = JSON.parse(sessionStorage.getItem('finowl_utm') || '{}');
        var utmParts = [];
        ['utm_source','utm_medium','utm_campaign','utm_term','utm_content'].forEach(function(k) {
            if (storedUtm[k]) utmParts.push(k + '=' + encodeURIComponent(storedUtm[k]));
        });
        if (utmParts.length > 0) {
            dashboardDest += (dashboardDest.includes('?') ? '&' : '?') + utmParts.join('&');
        }
    } catch(e) {}

    // Handle auto-login from email verification link
    if (autoLoginToken && isVerified) {
        localStorage.setItem('finowl_token', autoLoginToken);
        window.location.href = dashboardDest;
    }

    // Check if already logged in
    const existingToken = localStorage.getItem('finowl_token');
    if (existingToken) {
        window.location.href = dashboardDest;
    }

    // Show subscription banner
    if (isSubscribed) {
        document.getElementById('bannerSubscribed').style.display = 'flex';
    }

    // Show verified success message
    if (isVerified && !autoLoginToken) {
        successMsg.innerHTML = '✅ Email verified! You can now log in.';
        successMsg.style.display = 'block';
    }

    // Show error messages from verification flow
    if (errorParam === 'expired_token') {
        infoMsg.innerHTML = '🔗 This verification link has expired. Please <a href="/signup" style="color:#1d4ed8;font-weight:600;">sign up again</a> to get a new one.';
        infoMsg.style.display = 'block';
    } else if (errorParam === 'invalid_token' || errorParam === 'verification_failed') {
        errorMsg.textContent = 'Invalid or expired verification link. Please try signing up again.';
        errorMsg.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const rememberMe = rememberMeInput.checked;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in…';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, rememberMe })
            });

            const data = await res.json();

            if (!res.ok) {
                // Special handling for unverified email
                if (data.code === 'EMAIL_NOT_VERIFIED') {
                    infoMsg.innerHTML = '📧 ' + data.error + ' <br><small style="margin-top:4px;display:block;">Didn\'t get the email? <a href="/signup" style="color:#1d4ed8;font-weight:600;">Sign up again</a> to resend.</small>';
                    infoMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Log in';
                    return;
                }
                throw new Error(data.error || 'Login failed');
            }

            localStorage.setItem('finowl_token', data.token);
            localStorage.setItem('finowl_user', JSON.stringify(data.user));
            if (typeof window.trackGAEvent === 'function') {
                window.trackGAEvent('login', { method: 'email' });
            }
            window.location.href = dashboardDest;
        } catch (err) {
            errorMsg.textContent = err.message;
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Log in';
        }
    });
    </script>

    <!-- GA4 Consent-Aware Tracking -->
    <script>
    (function() {
        var GA_ID = '__GA_MEASUREMENT_ID__';
        window.dataLayer = window.dataLayer || [];
        function gtag() { window.dataLayer.push(arguments); }
        window.trackGAEvent = function(eventName, properties) {
            var hasConsent = localStorage.getItem('finowl_cookie_consent');
            if (hasConsent !== 'accepted') return;
            gtag('event', eventName, properties);
        };
        var hasConsent = localStorage.getItem('finowl_cookie_consent');
        if (hasConsent === 'accepted') {
            gtag('js', new Date());
            gtag('config', GA_ID, { send_page_view: true });
            var s = document.createElement('script');
            s.async = true;
            s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
            document.head.appendChild(s);
        }
    })();
    </script>
<script src="/pwa-install.js" defer></script>
</body>
</html>
