<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FinOwl</title>
    <meta name="theme-color" content="#d4920b">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ink: #0a0f1a;
            --paper: #faf9f6;
            --amber: #d4920b;
            --sage: #2d6a4f;
            --sage-light: #d8f3dc;
            --muted: #6b7280;
            --border: #e5e2db;
            --red: #dc2626;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

        .auth-container { width: 100%; max-width: 420px; }
        .logo {
            display: flex; align-items: center; gap: 0.5rem;
            justify-content: center; margin-bottom: 3rem;
            text-decoration: none; color: var(--ink);
        }
        .logo-owl {
            width: 44px; height: 44px; background: var(--amber);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 1.3rem;
        }
        .logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.8rem; }
        .auth-card {
            background: #fff; border: 1px solid var(--border);
            border-radius: 20px; padding: 2.5rem;
        }
        .auth-card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block; font-size: 0.85rem; font-weight: 500;
            margin-bottom: 0.5rem; color: var(--ink);
        }
        .form-group input {
            width: 100%; padding: 0.85rem 1rem;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 1rem; font-family: 'DM Sans', sans-serif;
            background: var(--paper); color: var(--ink);
            transition: border-color 0.2s; outline: none;
        }
        .form-group input:focus { border-color: var(--amber); }
        .field-hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.35rem; }
        .btn-primary {
            width: 100%; padding: 0.9rem; background: var(--amber);
            color: #fff; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: opacity 0.2s; margin-top: 0.5rem;
        }
        .btn-primary:hover { opacity: 0.88; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .alert {
            border-radius: 10px; padding: 0.85rem 1rem;
            font-size: 0.875rem; margin-bottom: 1.25rem; display: none;
        }
        .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: var(--red); }
        .alert-success { background: var(--sage-light); border: 1px solid #2d6a4f40; color: var(--sage); font-weight: 500; }
        .back-link {
            display: block; text-align: center; margin-top: 1.5rem;
            color: var(--muted); font-size: 0.9rem; text-decoration: none;
        }
        .back-link:hover { color: var(--ink); }
        .pw-strength {
            margin-top: 0.4rem; height: 4px; border-radius: 2px;
            background: var(--border); overflow: hidden; display: none;
        }
        .pw-strength-bar {
            height: 100%; border-radius: 2px;
            transition: width 0.3s, background 0.3s; width: 0;
        }
    </style>
    <!-- Sentry client-side error tracking -->
    <script src="/js/error-tracking.js"></script>
</head>
<body>
    <div class="auth-container">
        <a href="/" class="logo">
            <div class="logo-owl">🦉</div>
            <span class="logo-text">FinOwl</span>
        </a>

        <div class="auth-card" id="forgotCard">
            <h2>Forgot password?</h2>
            <p class="subtitle">Enter your email and we'll send you a reset link.</p>

            <div class="alert alert-error" id="forgotError"></div>
            <div class="alert alert-success" id="forgotSuccess"></div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="forgotEmail">Email address</label>
                    <input type="email" id="forgotEmail" placeholder="you@business.co.uk" required autocomplete="email" autofocus>
                </div>
                <button type="submit" class="btn-primary" id="forgotBtn">Send reset link</button>
            </form>
        </div>

        <div class="auth-card" id="resetCard" style="display:none;">
            <h2>Set new password</h2>
            <p class="subtitle">Choose a strong password for your account.</p>

            <div class="alert alert-error" id="resetError"></div>
            <div class="alert alert-success" id="resetSuccess"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="newPassword">New password</label>
                    <input type="password" id="newPassword" placeholder="At least 8 characters" required autocomplete="new-password">
                    <div class="pw-strength" id="pwStrength">
                        <div class="pw-strength-bar" id="pwStrengthBar"></div>
                    </div>
                    <div class="field-hint" id="pwHint">At least 8 characters</div>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">Confirm new password</label>
                    <input type="password" id="confirmNewPassword" placeholder="Repeat your password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary" id="resetBtn">Set new password</button>
            </form>
        </div>

        <a href="/login" class="back-link">&larr; Back to login</a>
    </div>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    // Show appropriate card based on whether we have a reset token
    if (resetToken) {
        document.getElementById('forgotCard').style.display = 'none';
        document.getElementById('resetCard').style.display = 'block';
        document.getElementById('newPassword').focus();
    }

    // ─── Forgot password form ────────────────────────────
    const forgotForm = document.getElementById('forgotForm');
    const forgotBtn = document.getElementById('forgotBtn');
    const forgotError = document.getElementById('forgotError');
    const forgotSuccess = document.getElementById('forgotSuccess');

    forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        forgotError.style.display = 'none';
        forgotBtn.disabled = true;
        forgotBtn.textContent = 'Sending…';

        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('forgotEmail').value.trim() })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Failed to send reset link');

            forgotSuccess.innerHTML = '📧 ' + (data.message || 'Check your email for a reset link.');
            forgotSuccess.style.display = 'block';
            forgotForm.style.display = 'none';
        } catch (err) {
            forgotError.textContent = err.message;
            forgotError.style.display = 'block';
            forgotBtn.disabled = false;
            forgotBtn.textContent = 'Send reset link';
        }
    });

    // ─── Reset password form ─────────────────────────────
    const resetForm = document.getElementById('resetForm');
    const resetBtn = document.getElementById('resetBtn');
    const resetError = document.getElementById('resetError');
    const resetSuccess = document.getElementById('resetSuccess');
    const newPasswordInput = document.getElementById('newPassword');
    const pwStrength = document.getElementById('pwStrength');
    const pwStrengthBar = document.getElementById('pwStrengthBar');
    const pwHint = document.getElementById('pwHint');

    newPasswordInput.addEventListener('input', () => {
        const val = newPasswordInput.value;
        pwStrength.style.display = val.length > 0 ? 'block' : 'none';
        let score = 0;
        if (val.length >= 8) score++;
        if (val.length >= 12) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const widths = ['0%','25%','45%','65%','85%','100%'];
        const colors = ['#dc2626','#ea580c','#d4920b','#16a34a','#16a34a'];
        const labels = ['Too short','Weak','Fair','Good','Strong'];
        pwStrengthBar.style.width = widths[score] || '0%';
        pwStrengthBar.style.background = colors[Math.max(0, score - 1)] || '#dc2626';
        if (val.length > 0 && score === 0) {
            pwHint.textContent = 'Too short (min 8 characters)';
            pwHint.style.color = '#dc2626';
        } else if (val.length > 0) {
            pwHint.textContent = (labels[score - 1] || 'Weak') + ' password';
            pwHint.style.color = colors[Math.max(0, score - 1)] || '#dc2626';
        }
    });

    resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetError.style.display = 'none';

        const password = newPasswordInput.value;
        const confirmPassword = document.getElementById('confirmNewPassword').value;

        if (password.length < 8) return showResetError('Password must be at least 8 characters');
        if (password !== confirmPassword) return showResetError('Passwords do not match');

        resetBtn.disabled = true;
        resetBtn.textContent = 'Saving…';

        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: resetToken, password, confirmPassword })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Failed to reset password');

            // Auto-login
            if (data.token) {
                localStorage.setItem('finowl_token', data.token);
                localStorage.setItem('finowl_user', JSON.stringify(data.user));
            }

            resetSuccess.innerHTML = '✅ Password updated! Redirecting to your dashboard…';
            resetSuccess.style.display = 'block';
            resetForm.style.display = 'none';

            setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
        } catch (err) {
            showResetError(err.message);
            resetBtn.disabled = false;
            resetBtn.textContent = 'Set new password';
        }
    });

    function showResetError(msg) {
        resetError.textContent = msg;
        resetError.style.display = 'block';
    }
    </script>
<script src="/pwa-install.js" defer></script>
</body>
</html>
